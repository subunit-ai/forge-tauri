name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # TODO: per-SHA pinnen (Supply-Chain)
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux Tauri-Systemdeps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Frontend deps + build
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: cargo check + clippy
        working-directory: src-tauri
        run: |
          cargo check --locked
          cargo clippy --locked -- -D warnings || cargo clippy --locked
