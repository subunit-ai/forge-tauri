name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# TODO (Signing): WINDOWS_CERTIFICATE / APPLE_* Secrets setzen → Signing schaltet sich via if-Gate an.
# Hinweis: Win-ARM-Sidecar = x64 via Emulation (Bun hat kein win-arm64 — siehe fetch-sidecars.sh).
# Updater-Signing: CI braucht TAURI_SIGNING_PRIVATE_KEY und TAURI_SIGNING_PRIVATE_KEY_PASSWORD.

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, triple: x86_64-pc-windows-msvc, args: "--bundles nsis" }
          - { os: windows-11-arm, triple: aarch64-pc-windows-msvc, args: "--target aarch64-pc-windows-msvc --bundles nsis" }
          - { os: ubuntu-latest,  triple: x86_64-unknown-linux-gnu, args: "--bundles deb" }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout forge-tauri
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout bridge source (pinned)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: subunit-ai/bridge-tauri
          ref: v0.2.0
          token: ${{ secrets.GITHUB_TOKEN }}
          path: bridge-src
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Linux Tauri-Systemdeps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build + verify bridge sidecar
        shell: bash
        env:
          BRIDGE_SRC: ${{ github.workspace }}/bridge-src
          ONLY: ${{ matrix.triple }}
        run: bash scripts/fetch-sidecars.sh
      - name: Frontend deps
        run: bun install --frozen-lockfile
      - name: Build + release (Tauri)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for updater artifacts; set from the generated updater private key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "u1 Forge ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
