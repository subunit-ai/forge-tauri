name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Signing (cert-gated): WINDOWS_CERTIFICATE / APPLE_* Secrets → schaltet sich via if-Gate an.
# Updater-Signing: TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD).
# Architektur: Sidecars werden EINMAL auf Linux gebaut (Bun cross-compile inkl. Windows-Targets)
# und als Artifact verteilt — vermeidet Cross-Repo-Checkout des privaten bridge-tauri auf Windows
# (ssh-key-Permissions-Problem). Win-ARM-Sidecar = x64 via Emulation (Bun hat kein win-arm64).
permissions:
  contents: write

jobs:
  sidecars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout bridge source (pinned, read-only deploy key)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: subunit-ai/bridge-tauri
          ref: v0.2.0
          ssh-key: ${{ secrets.BRIDGE_DEPLOY_KEY }}
          path: bridge-src
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.11 }
      - name: Build all sidecars + manifest (Bun cross-compile)
        env:
          BRIDGE_SRC: ${{ github.workspace }}/bridge-src
        run: bash scripts/fetch-sidecars.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sidecars
          path: |
            src-tauri/binaries/subunit-bridge-*
            scripts/sidecar-sha256.txt
          if-no-files-found: error
          retention-days: 1

  release:
    needs: sidecars
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, args: "--bundles nsis" }
          - { os: windows-11-arm, args: "--target aarch64-pc-windows-msvc --bundles nsis" }
          - { os: ubuntu-latest,  args: "--bundles deb" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download sidecars
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sidecars
          path: ${{ github.workspace }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Linux Tauri-Systemdeps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Make linux sidecar executable
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x src-tauri/binaries/subunit-bridge-x86_64-unknown-linux-gnu || true
      - name: Frontend deps
        run: bun install --frozen-lockfile
      - name: Build + release (Tauri)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "u1 Forge ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
