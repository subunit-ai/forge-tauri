name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# TODO (Supply-Chain): alle `uses:` per Commit-SHA pinnen statt Tag.
# TODO (Signing): WINDOWS_CERTIFICATE / APPLE_* Secrets setzen → Signing schaltet sich via if-Gate an.
# Hinweis: Win-ARM-Sidecar = x64 via Emulation (Bun hat kein win-arm64 — siehe fetch-sidecars.sh).

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, triple: x86_64-pc-windows-msvc, args: "" }
          - { os: windows-11-arm, triple: aarch64-pc-windows-msvc, args: "--target aarch64-pc-windows-msvc" }
          - { os: ubuntu-latest,  triple: x86_64-unknown-linux-gnu, args: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout forge-tauri
        uses: actions/checkout@v4
      - name: Checkout bridge source (pinned)
        uses: actions/checkout@v4
        with:
          repository: subunit-ai/bridge-tauri
          ref: v0.2.0
          token: ${{ secrets.GITHUB_TOKEN }}
          path: bridge-src
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux Tauri-Systemdeps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build + verify bridge sidecar
        shell: bash
        env:
          BRIDGE_SRC: ${{ github.workspace }}/bridge-src
          ONLY: ${{ matrix.triple }}
        run: bash scripts/fetch-sidecars.sh
      - name: Frontend deps
        run: bun install --frozen-lockfile
      - name: Build + release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # cert-gated; leer = unsignierter Build (funktioniert heute)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "u1 Forge ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
